<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome to the City of St. George</title>
    <link rel="icon" href="https://github.com/ScScBubba/stgeorge/blob/main/SCSC%20Icon.png" />

    <!-- Brand Style -->
    <style>
      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #ffffff;
        color: #333;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #e87722;
        color: white;
        padding: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      header img {
        height: 50px;
      }

      main {
        padding: 2rem;
        max-width: 800px;
        margin: auto;
      }

      h1 {
        color: #e87722;
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      h2 {
        color: #e87722;
        font-size: 1.4rem;
        margin-top: 2rem;
      }

      p {
        font-size: 1rem;
        line-height: 1.6;
      }

      img.illustration {
        display: block;
        margin: 2rem auto;
        max-width: 100%;
        height: auto;
      }

      footer {
        background-color: #e87722;
        text-align: center;
        padding: 1rem;
        font-size: 0.9rem;
        color: #777;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="https://github.com/ScScBubba/stgeorge/blob/main/SCSC_Icon.png" alt="ScanSource Logo" />
      <div>Technology solutions for a connected world</div>
    </header>

    <main>
      <h1>Welcome to the City of St. George Chat Demo</h1>
      <img
        class="illustration"
        src="https://github.com/ScScBubba/stgeorge/blob/main/SCSCChatDemoBackground.png"
        alt="Test Success Illustration"
      />
      <h2>You have successfully accessed the chat test page.</h2>
      <p>
        Need assistance? Use the chat widget in the corner to get help from our support team.
      </p>
    </main>

    <footer>
      &copy; ScanSource Inc. | 2026 Cisco Care Chat Demo | <a href="https://www.scansource.com" target="_blank">scansource.com</a>
    </footer>

    <!-- Put Chat Widget 1 Line Below -->

</html>
